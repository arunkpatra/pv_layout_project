name: Deploy Layout Engine

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Deploy to Lambda (prod)
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update Lambda function code
        env:
          AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws lambda update-function-code \
            --function-name layout_engine_lambda_prod \
            --image-uri ${AWS_ACCOUNT_ID}.dkr.ecr.${AWS_REGION}.amazonaws.com/renewable-energy/layout-engine:prod \
            --region ${AWS_REGION}

      - name: Wait for Lambda update to complete
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws lambda wait function-updated \
            --function-name layout_engine_lambda_prod \
            --region ${AWS_REGION}

      - name: Confirm deployed image
        env:
          AWS_REGION: ${{ vars.AWS_REGION }}
        run: |
          aws lambda get-function \
            --function-name layout_engine_lambda_prod \
            --region ${AWS_REGION} \
            --query 'Code.ImageUri' \
            --output text
