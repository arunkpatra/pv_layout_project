name: Build Linux Installers

# Two-stage Tauri+sidecar build for Linux. Produces both .AppImage
# (portable, runs on any glibc-compatible distro) and .deb (native
# install on Debian / Ubuntu / Mint / Pop / etc).
#
# Tauri's bundle pass produces both in one shot — we just locate
# them and upload separately.
#
# Trigger modes:
#   - workflow_call: invoked by release.yml on tag push.
#   - workflow_dispatch: ad-hoc Linux builds.
#
# Security posture: every interpolated expression is a trusted
# matrix/runner/ref value — no user-controlled input.

on:
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: build-linux-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-linux:
    name: Build & Package (Linux x64)
    runs-on: ubuntu-22.04
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Tauri 2 system deps
        # Verbatim match of Tauri 2's canonical Debian/Ubuntu
        # prerequisites at https://v2.tauri.app/start/prerequisites/
        # plus `patchelf` for AppImage post-link.
        #
        # NOTE — libayatana-appindicator3-dev (modern fork) NOT
        # libappindicator3-dev (deprecated GNOME version). The two
        # conflict — apt refuses to install both. Tauri's own
        # GitHub Actions example page incorrectly still uses the
        # deprecated one as of 2026-05-01; the canonical
        # Prerequisites page is authoritative.
        #
        # build-essential / curl / wget / file are pre-installed on
        # ubuntu-22.04 runners, but listed here defensively to match
        # canonical and avoid hidden runner-image dependencies.
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      # Stage 1: PyInstaller sidecar
      - name: Install sidecar deps
        working-directory: python/pvlayout_engine
        run: uv sync --extra dev

      - name: Build sidecar (PyInstaller)
        working-directory: python/pvlayout_engine
        run: uv run pyinstaller pvlayout-engine.spec --noconfirm --clean

      - name: Smoke-test sidecar binary
        working-directory: python/pvlayout_engine
        run: ./scripts/smoke_binary.sh

      - name: Smoke-test parallel-spawn path
        working-directory: python/pvlayout_engine
        run: ./scripts/smoke_parallel.sh

      # Stage 2: Tauri bundle
      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        working-directory: apps/desktop
        run: bun run tauri:build

      - name: Locate .AppImage and .deb
        run: |
          mkdir -p out
          appimage=$(find apps/desktop/src-tauri/target/release/bundle/appimage -name '*.AppImage' | head -1)
          deb=$(find apps/desktop/src-tauri/target/release/bundle/deb -name '*.deb' | head -1)
          if [ -z "$appimage" ]; then
            echo "::error::No .AppImage found in tauri bundle output"
            ls -la apps/desktop/src-tauri/target/release/bundle/ || true
            exit 1
          fi
          if [ -z "$deb" ]; then
            echo "::error::No .deb found in tauri bundle output"
            ls -la apps/desktop/src-tauri/target/release/bundle/ || true
            exit 1
          fi
          echo "Found AppImage: $appimage"
          echo "Found deb: $deb"
          cp "$appimage" "out/SolarLayout-linux-x64.AppImage"
          cp "$deb" "out/SolarLayout-linux-x64.deb"
          ls -lh out/

      - name: Upload AppImage artifact
        uses: actions/upload-artifact@v4
        with:
          name: solarlayout-linux-x64-appimage
          path: out/SolarLayout-linux-x64.AppImage
          retention-days: 30
          if-no-files-found: error

      - name: Upload deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: solarlayout-linux-x64-deb
          path: out/SolarLayout-linux-x64.deb
          retention-days: 30
          if-no-files-found: error
