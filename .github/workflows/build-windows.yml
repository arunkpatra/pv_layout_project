name: Build Windows Installer

# Two-stage Tauri+sidecar build for Windows. Produces a zipped .msi.
#
# Why .zip the .msi: unsigned .msi triggers Chrome's "this file may
# harm your computer" download prompt on every download, which cuts
# install conversion meaningfully. Wrapping in .zip sidesteps that
# prompt until we have an EV code-signing cert. Once signing lands
# (pre-launch checklist in docs/RELEASE.md), drop the zip step and
# ship the raw .msi.
#
# Trigger modes:
#   - workflow_call: invoked by release.yml on tag push.
#   - workflow_dispatch: ad-hoc Windows build for QA without cutting
#     a release. Artifact retained 30 days; download from the
#     Actions run summary.
#
# Security posture: every interpolated expression is a trusted
# matrix/runner/ref value — there is no user-controlled input
# (issue body, PR title, commit message, etc.) injected anywhere.

on:
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: build-windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build & Package (Windows)
    runs-on: windows-latest
    timeout-minutes: 30

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + Tauri target
        uses: Swatinem/rust-cache@v2
        with:
          # Tauri's Rust shell lives at apps/desktop/src-tauri; its
          # target/ dir is what we want cached. Default behaviour
          # also covers ~/.cargo/registry + ~/.cargo/git.
          workspaces: |
            apps/desktop/src-tauri -> target

      # Stage 1: PyInstaller sidecar binary
      # Produces python/pvlayout_engine/dist/pvlayout-engine.exe.
      - name: Install sidecar deps
        working-directory: python/pvlayout_engine
        run: uv sync --extra dev

      - name: Build sidecar (PyInstaller)
        working-directory: python/pvlayout_engine
        run: uv run pyinstaller pvlayout-engine.spec --noconfirm --clean

      - name: Smoke-test sidecar binary
        working-directory: python/pvlayout_engine
        run: ./scripts/smoke_binary.sh

      # Stage 2: Tauri bundle
      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        working-directory: apps/desktop
        run: bun run tauri:build

      - name: Locate .msi and zip it
        run: |
          mkdir -p out
          msi=$(find apps/desktop/src-tauri/target/release/bundle/msi -name '*.msi' | head -1)
          if [ -z "$msi" ]; then
            echo "::error::No .msi found in tauri bundle output"
            ls -la apps/desktop/src-tauri/target/release/bundle/ || true
            exit 1
          fi
          echo "Found MSI: $msi"
          cp "$msi" "out/SolarLayout-windows.msi"
          powershell -Command "Compress-Archive -Path 'out\\SolarLayout-windows.msi' -DestinationPath 'out\\SolarLayout-windows.zip'"
          ls -lh out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solarlayout-windows
          path: out/SolarLayout-windows.zip
          retention-days: 30
          if-no-files-found: error
