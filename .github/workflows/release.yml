name: Release

on:
  push:
    tags:
      - "v*"

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  release:
    name: Gate & Release
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all gates
        run: bun run lint && bun run typecheck && bun run test && bun run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: pk_test_Y2xhc3NpYy13YXNwLTU1LmNsZXJrLmFjY291bnRzLmRldiQ

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          PRERELEASE_FLAG=""
          if echo "$TAG_NAME" | grep -q "^v0\."; then
            PRERELEASE_FLAG="--prerelease"
          fi
          gh release create "$TAG_NAME" \
            --generate-notes \
            --title "$TAG_NAME" \
            $PRERELEASE_FLAG
