name: Platform Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: environment

concurrency:
  group: platform-deployment-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  gate:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Setup uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.6.x"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all gates
        run: bun run lint && bun run typecheck && bun run test && bun run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  migrate:
    name: Run DB Migrations (mvp_db)
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Prisma migrate deploy
        working-directory: packages/mvp_db
        run: bunx prisma migrate deploy
        env:
          MVP_DATABASE_URL: ${{ secrets.MVP_DATABASE_URL }}

  deploy:
    name: Deploy Apps to Vercel
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Deploy mvp_api
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_MVP_API }}
        run: curl -sf -X POST "$DEPLOY_HOOK"

      - name: Deploy mvp_web
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_MVP_WEB }}
        run: curl -sf -X POST "$DEPLOY_HOOK"

      - name: Deploy mvp_admin
        env:
          DEPLOY_HOOK: ${{ secrets.VERCEL_DEPLOY_HOOK_MVP_ADMIN }}
        run: curl -sf -X POST "$DEPLOY_HOOK"
