name: Build macOS Installer

# Two-stage Tauri+sidecar build for macOS. Produces a .dmg per arch
# (arm64 + x64).
#
# We don't zip the .dmg — macOS users expect raw .dmg as the
# canonical drag-and-drop installer, and Chrome's download warning
# is less aggressive on .dmg than on .msi. Gatekeeper will warn on
# first launch since the bundle is unsigned; that's a separate
# code-signing problem (pre-launch checklist in docs/RELEASE.md).
#
# Trigger modes:
#   - workflow_call: invoked by release.yml on tag push.
#   - workflow_dispatch: ad-hoc per-arch builds via the Actions UI.
#
# Security posture: every interpolated expression is a trusted
# matrix/runner/ref value — no user-controlled input.

on:
  workflow_dispatch: {}
  workflow_call: {}

concurrency:
  group: build-macos-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-macos:
    name: Build & Package (${{ matrix.arch }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-14
            arch: arm64
            tauri_arch: aarch64
          - runner: macos-15-intel
            arch: x64
            tauri_arch: x64

    defaults:
      run:
        shell: bash

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Bun install store
        uses: actions/cache@v4
        with:
          path: ~/.bun/install/cache
          key: bun-${{ runner.os }}-${{ hashFiles('bun.lock') }}
          restore-keys: |
            bun-${{ runner.os }}-

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry + Tauri target
        uses: Swatinem/rust-cache@v2
        with:
          # Tauri's Rust shell lives at apps/desktop/src-tauri; its
          # target/ dir is what we want cached. Default behaviour
          # also covers ~/.cargo/registry + ~/.cargo/git.
          workspaces: |
            apps/desktop/src-tauri -> target

      # Stage 1: PyInstaller sidecar
      - name: Install sidecar deps
        working-directory: python/pvlayout_engine
        run: uv sync --extra dev

      - name: Build sidecar (PyInstaller)
        working-directory: python/pvlayout_engine
        run: uv run pyinstaller pvlayout-engine.spec --noconfirm --clean

      - name: Smoke-test sidecar binary
        working-directory: python/pvlayout_engine
        run: ./scripts/smoke_binary.sh

      - name: Smoke-test parallel-spawn path
        working-directory: python/pvlayout_engine
        run: ./scripts/smoke_parallel.sh

      # Stage 2: Tauri bundle
      - name: Install workspace deps
        run: bun install --frozen-lockfile

      - name: Build Tauri app
        working-directory: apps/desktop
        run: bun run tauri:build

      - name: Locate .dmg
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          mkdir -p out
          dmg=$(find apps/desktop/src-tauri/target/release/bundle/dmg -name '*.dmg' | head -1)
          if [ -z "$dmg" ]; then
            echo "::error::No .dmg found in tauri bundle output"
            ls -la apps/desktop/src-tauri/target/release/bundle/ || true
            exit 1
          fi
          echo "Found DMG: $dmg"
          cp "$dmg" "out/SolarLayout-macos-${ARCH}.dmg"
          ls -lh out/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: solarlayout-macos-${{ matrix.arch }}
          path: out/SolarLayout-macos-${{ matrix.arch }}.dmg
          retention-days: 30
          if-no-files-found: error
