name: Platform Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: Target environment
        required: true
        type: environment

concurrency:
  group: platform-deployment-${{ inputs.environment }}
  cancel-in-progress: false

jobs:
  gate:
    name: Lint, Typecheck, Test & Build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - name: Setup uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run all gates
        run: bun run lint && bun run typecheck && bun run test && bun run build
        env:
          NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY: ${{ vars.NEXT_PUBLIC_CLERK_PUBLISHABLE_KEY }}

  migrate:
    name: Run DB Migrations (mvp_db)
    needs: gate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run Prisma migrate deploy
        working-directory: packages/mvp_db
        run: bunx prisma migrate deploy
        env:
          MVP_DATABASE_URL: ${{ secrets.MVP_DATABASE_URL }}

  deploy-mvp-api:
    name: Deploy mvp_api
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_API }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_API }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_API }}

  deploy-mvp-web:
    name: Deploy mvp_web
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_WEB }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_WEB }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_WEB }}

  deploy-mvp-admin:
    name: Deploy mvp_admin
    needs: migrate
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.11

      - name: Install Vercel CLI
        run: npm install -g vercel

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_ADMIN }}

      - name: Build
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_ADMIN }}

      - name: Deploy
        run: vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ vars.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ vars.VERCEL_PROJECT_ID_MVP_ADMIN }}

  build-lambda-images:
    # C4 cloud-offload arc: build + push :<environment-tag> alongside the
    # standard :<git-sha>. Calls build-lambdas.yml as a reusable workflow
    # so the Dockerfile-build / buildx / QEMU / arm64 / ECR push logic
    # lives in a single place. The :<env-tag> push is gated on the
    # environment-tag input (set only here, never by build-lambdas.yml's
    # other triggers) — env tags are deploy-state pointers, produced only
    # when an operator has actively triggered a deploy.
    name: Build Lambda images
    needs: migrate
    if: inputs.environment == 'production'
    uses: ./.github/workflows/build-lambdas.yml
    with:
      environment-tag: ${{ inputs.environment }}
    secrets: inherit

  deploy-lambdas:
    # C4 cloud-offload arc: refresh AWS Lambda functions to the latest
    # :<environment-tag>-tagged image. build-lambda-images (above) pushes
    # the env tag; this job calls aws lambda update-function-code so the
    # function picks up the new digest behind the same tag.
    #
    # Static matrix — explicit deploy intent. Future Lambdas (compute-
    # layout at C6, detect-water at C16, compute-energy at C18) get added
    # here when their AWS function shells are provisioned. Static avoids
    # the failure mode where a new python/lambdas/<dir>/ lands before its
    # AWS function exists.
    #
    # Gated to the production env only: no staging Lambda function exists
    # yet. When a staging environment is added with its own Lambda
    # function shells, this job becomes env-conditional via matrix.
    name: Deploy Lambdas
    needs: build-lambda-images
    if: inputs.environment == 'production'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment: ${{ inputs.environment }}
    permissions:
      id-token: write
      contents: read

    strategy:
      fail-fast: false
      matrix:
        lambda: [parse-kmz]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Update Lambda function code
        run: |
          aws lambda update-function-code \
            --function-name solarlayout-${{ matrix.lambda }}-prod \
            --image-uri 378240665051.dkr.ecr.ap-south-1.amazonaws.com/solarlayout/${{ matrix.lambda }}:production \
            --publish

      - name: Wait for function update to settle
        run: |
          aws lambda wait function-updated \
            --function-name solarlayout-${{ matrix.lambda }}-prod
