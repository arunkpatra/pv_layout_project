[project]
name = "pvlayout-engine"
version = "0.0.0"
description = "SolarLayout desktop sidecar — FastAPI wrapper around the layout engine"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
authors = [
    { name = "SolarLayout" }
]
# S0 stub: no dependencies yet.
# S1 adds: shapely, pyproj, simplekml, matplotlib, numpy, ezdxf (vendored from PVlayout_Advance).
# S2 adds: fastapi, uvicorn, pydantic.
dependencies = []

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "ruff>=0.8",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pvlayout_engine"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
