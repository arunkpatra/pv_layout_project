[project]
name = "pvlayout-engine"
version = "0.0.0"
description = "SolarLayout desktop sidecar — FastAPI wrapper around the layout engine"
readme = "README.md"
requires-python = ">=3.12"
license = { text = "Proprietary" }
authors = [
    { name = "SolarLayout" }
]
# Runtime dependencies for pvlayout_core — the vendored domain logic.
# Matches PVlayout_Advance requirements.txt minus PyQt5 and keyring (UI/auth moved
# to Tauri + React). matplotlib is used ONLY by pdf_exporter; no interactive
# backend ever initialized inside the sidecar.
# S2 will add: fastapi, uvicorn, pydantic for the HTTP wrapper.
dependencies = [
    "shapely>=2.0",
    "pyproj>=3.5",
    "simplekml>=1.3",
    "matplotlib>=3.7",
    "numpy>=1.24",
    "ezdxf>=1.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.3",
    "ruff>=0.8",
    "mypy>=1.13",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["pvlayout_engine", "pvlayout_core"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "B", "A", "C4", "SIM"]

[tool.pytest.ini_options]
testpaths = ["tests"]
python_files = ["test_*.py"]
